name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - claude/charming-brahmagupta-hp4sa

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Deploy main app to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Install push-cron worker dependencies
        run: npm ci
        working-directory: workers/push-cron

      - name: Deploy push-cron worker
        run: npx wrangler deploy --var VAPID_PUBLIC_KEY:${{ secrets.VITE_VAPID_PUBLIC_KEY }} --var VAPID_PRIVATE_KEY:${{ secrets.VAPID_PRIVATE_KEY }} --var SUPABASE_URL:${{ secrets.VITE_SUPABASE_URL }} --var SUPABASE_SERVICE_KEY:${{ secrets.SUPABASE_SERVICE_KEY }}
        working-directory: workers/push-cron
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
